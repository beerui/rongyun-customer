<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DajiCS Vite + TS 示例</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "PingFang SC", system-ui; color: #1f2937; background: #f8fafc; }
    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
    header h1 { font-size: 24px; margin: 0; }
    header p { color: #64748b; margin-top: 6px; }

    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 28px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06); overflow: hidden; transition: transform .15s; }
    .card:hover { transform: translateY(-2px); }
    .card img { width: 100%; height: 180px; object-fit: cover; background: #f1f5f9; display: block; }
    .card .info { padding: 14px 16px 18px; }
    .card .title { font-size: 15px; font-weight: 600; }
    .card .price { color: #dc2626; font-weight: 700; font-size: 17px; margin-top: 8px; }
    .card .origin { color: #94a3b8; font-size: 12px; text-decoration: line-through; margin-left: 6px; }
    .card button { margin-top: 12px; width: 100%; padding: 8px 0; background: #FA3E3E; color: #fff; border: 0; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .card button:hover { background: #e43434; }

    .toolbar { margin-top: 32px; padding: 16px 20px; background: #fff; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 8px; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06); }
    .toolbar button { padding: 8px 16px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .toolbar button:hover { background: #e2e8f0; }

    .hud { position: fixed; top: 24px; right: 24px; width: 320px; max-height: 60vh; background: #0f172a; color: #e2e8f0; border-radius: 8px; padding: 12px 14px; font-family: ui-monospace, monospace; font-size: 11px; overflow: auto; box-shadow: 0 10px 30px rgba(15, 23, 42, .4); z-index: 2147483100; }
    .hud h4 { margin: 0 0 8px 0; font-size: 12px; color: #fbbf24; }
    .hud pre { margin: 0; white-space: pre-wrap; }

    @media (max-width: 640px) {
      .hud { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DajiCS Vite + TypeScript 示例</h1>
      <p>模拟一个商城产品列表页，演示如何在现代 Vite 项目中通过 npm 依赖方式接入 SDK，享受完整 TS 类型补全。</p>
    </header>

    <section class="products" id="products"></section>

    <section class="toolbar">
      <button data-act="mount">挂载 Launcher</button>
      <button data-act="unmount">卸载</button>
      <button data-act="toggle">toggle Widget</button>
      <button data-act="unread-plus">未读 +1</button>
      <button data-act="unread-reset">未读归零</button>
      <button data-act="refresh-id">refreshIdentity</button>
      <button data-act="sim-end">模拟会话结束</button>
    </section>
  </div>

  <div class="hud">
    <h4>事件监控器</h4>
    <pre id="log">等待事件...</pre>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
