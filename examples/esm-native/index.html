<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DajiCS ESM 原生示例</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", system-ui; max-width: 720px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #1f2937; }
    h1 { font-size: 22px; }
    code { background: #f1f5f9; padding: 1px 6px; border-radius: 4px; font-size: 13px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 6px; font-size: 12px; overflow: auto; max-height: 200px; }
    button { padding: 8px 16px; margin-right: 8px; background: #fff; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; }
    button:hover { background: #f9fafb; }
    .hint { color: #475569; font-size: 13px; background: #f8fafc; padding: 10px 14px; border-left: 3px solid #FA3E3E; }
  </style>
</head>
<body>
  <h1>DajiCS ESM 原生示例（import map）</h1>
  <p>演示用原生浏览器 ESM + <code>importmap</code> 直接 <code>import</code> 本 SDK，无需 bundler。</p>

  <div class="hint">
    运行前把 ESM bundle 拷到本目录：<br>
    <code>cp node_modules/@daji/cs-sdk/index.esm.js .</code><br>
    本仓库：<code>cp dist/sdk/index.esm.js examples/esm-native/</code><br>
    再 <code>npx serve .</code> 打开（原生 ESM 不支持 <code>file://</code>）。
  </div>

  <div style="margin-top: 20px;">
    <button id="open">DajiCS.open</button>
    <button id="mount">挂载 Launcher</button>
    <button id="toggle">toggle widget</button>
    <button id="refresh-id">refreshIdentity</button>
  </div>

  <h3 style="margin-top: 28px; font-size: 14px;">事件日志</h3>
  <pre id="log"></pre>

  <script type="importmap">
  {
    "imports": {
      "@daji/cs-sdk": "./index.esm.js"
    }
  }
  </script>
  <script type="module">
    import {
      boot,
      open,
      mountLauncher,
      toggleWidget,
      refreshIdentity,
      on,
      version,
    } from '@daji/cs-sdk'

    console.log('DajiCS version:', version)

    boot({
      baseUrl: 'https://cs.chinamarket.cn',
      apiBase: 'https://api.chinamarket.cn',
      debug: true,
    })

    const logEl = document.getElementById('log')
    const lines = []
    function log(line) {
      const ts = new Date().toLocaleTimeString()
      lines.push(`[${ts}] ${line}`)
      if (lines.length > 30) lines.shift()
      logEl.textContent = lines.join('\n')
    }

    ;['ready', 'window:open', 'window:focus', 'window:close',
      'launcher:mount', 'launcher:click', 'launcher:unmount',
      'widget:open', 'widget:close',
      'unread:change', 'message:incoming', 'conversation:end',
      'presend:start', 'presend:success', 'presend:error',
      'error',
    ].forEach((ev) => on(ev, (p) => log(`${ev} ${p ? JSON.stringify(p) : ''}`)))

    const common = { userId: 'u_esm_demo', userName: 'ESM 访客', supplierId: 'shop_esm' }

    document.getElementById('open').onclick = () => open({ ...common })
    document.getElementById('mount').onclick = () => mountLauncher({
      position: 'bottom-right',
      title: 'ESM 示例客服',
      mode: 'iframe',
      openWith: common,
    })
    document.getElementById('toggle').onclick = () => toggleWidget()
    document.getElementById('refresh-id').onclick = () => {
      const ok = refreshIdentity({ token: 'new-token-' + Date.now() })
      log('refreshIdentity: ' + ok)
    }
  </script>
</body>
</html>
